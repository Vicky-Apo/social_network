services:
  postgres:
    image: postgres:16
    container_name: social-network-postgres
    environment:
      POSTGRES_USER: social-network-role
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: social-network-db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social-network-role -d social-network-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - social-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social-network-backend
    environment:
      - SERVER_ADDR=0.0.0.0:8080
      - DATABASE_URL=postgres://social-network-role:123456@postgres:5432/social-network-db?sslmode=disable
      - MIGRATIONS_PATH=/root/pkg/db/migrations/postgres
      - UPLOAD_DIR=/root/uploads
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - social-network
    volumes:
      - backend-uploads:/root/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: social-network-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - social-network

volumes:
  pgdata:
  backend-uploads:

networks:
  social-network:
    driver: bridge
